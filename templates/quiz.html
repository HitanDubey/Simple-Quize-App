{% extends "base.html" %}

{% block title %}Quiz - {{ topic }} | EchoQuest Pro{% endblock %}

{% block content %}
<div class="quiz-wrapper">
    <div class="quiz-header-enhanced">
        <div class="topic-badge">📚 {{ topic }}</div>
        <div class="player-info">👤 {{ username }}</div>
        <div class="score-board">
            <span>🏆 Score: </span>
            <span id="score">0</span>
        </div>
    </div>
    
    <div class="quiz-main">
        <div class="progress-bar">
            <div id="progress-fill" class="progress-fill"></div>
        </div>
        
        <div class="question-container">
            <div class="question-number" id="q-num">Question 1/{{ total_questions }}</div>
            <div class="difficulty-indicator" id="difficulty"></div>
            <h2 id="question-text" class="question-text">Loading questions...</h2>
            
            <div id="options-container" class="options-grid-enhanced">
                <div class="loading-spinner">🌀 Loading...</div>
            </div>
            
            <div class="quiz-footer">
                <div class="timer-circle">
                    <svg class="timer-svg" width="60" height="60">
                        <circle cx="30" cy="30" r="25" class="timer-bg"/>
                        <circle cx="30" cy="30" r="25" class="timer-progress" id="timer-progress"/>
                    </svg>
                    <span id="timer" class="timer-text">20</span>
                </div>
                <button id="hint-btn" class="hint-button">💡 Hint</button>
            </div>
            
            <div id="feedback" class="feedback-message"></div>
        </div>
    </div>
</div>

<!-- Animated Character -->
<div class="animated-character character-quiz">
    <div class="character-body">
        <div class="character-face">😺</div>
        <div class="character-legs">
            <div class="leg leg-left"></div>
            <div class="leg leg-right"></div>
        </div>
    </div>
    <div class="speech-bubble">Let's go! 🎯</div>
</div>

<script>
    // Quiz State Variables
    let currentQuestionId = null;
    let currentQuestionNum = 1;
    let totalQuestions = {{ total_questions }};
    let currentScore = 0;
    let timeLeft = 20;
    let timerInterval = null;
    let questionStartTime = null;
    let canAnswer = true;
    let currentCorrectAnswer = null;
    let currentExplanation = null;
    
    // DOM Elements
    const scoreElement = document.getElementById('score');
    const questionTextElement = document.getElementById('question-text');
    const optionsContainer = document.getElementById('options-container');
    const feedbackDiv = document.getElementById('feedback');
    const qNumElement = document.getElementById('q-num');
    const timerElement = document.getElementById('timer');
    const progressFill = document.getElementById('progress-fill');
    const difficultyElement = document.getElementById('difficulty');
    const hintBtn = document.getElementById('hint-btn');
    
    // Load first question
    function loadQuestion() {
        canAnswer = true;
        questionStartTime = Date.now();
        
        // Show loading state
        questionTextElement.textContent = 'Loading question...';
        optionsContainer.innerHTML = '<div class="loading-spinner">🌀 Loading...</div>';
        
        fetch('/get_current_question')
            .then(response => response.json())
            .then(data => {
                if (data.quiz_ended) {
                    endQuiz();
                    return;
                }
                
                // Store question data
                currentQuestionId = data.id;
                currentQuestionNum = data.question_number;
                currentCorrectAnswer = data.correct_answer;
                currentExplanation = data.explanation;
                
                // Update UI
                questionTextElement.textContent = data.text;
                qNumElement.textContent = `Question ${currentQuestionNum}/${totalQuestions}`;
                
                // Update difficulty badge
                const difficulty = data.difficulty || 'medium';
                const difficultyIcons = {
                    'easy': '🟢',
                    'medium': '🟡',
                    'hard': '🔴'
                };
                difficultyElement.innerHTML = `${difficultyIcons[difficulty] || '🟡'} ${difficulty.charAt(0).toUpperCase() + difficulty.slice(1)}`;
                
                // Update progress bar
                const progressPercent = ((currentQuestionNum - 1) / totalQuestions) * 100;
                progressFill.style.width = `${progressPercent}%`;
                
                // Create options
                optionsContainer.innerHTML = '';
                const letters = ['A', 'B', 'C', 'D'];
                
                data.options.forEach((option, index) => {
                    const button = document.createElement('button');
                    button.className = 'option-enhanced';
                    button.innerHTML = `<span class="opt-letter">${letters[index]}</span> ${escapeHtml(option)}`;
                    button.onclick = () => submitAnswer(letters[index]);
                    button.setAttribute('data-opt', letters[index]);
                    optionsContainer.appendChild(button);
                });
                
                // Reset and start timer
                resetTimer();
                
                // Update character speech
                updateCharacterSpeech(`Question ${currentQuestionNum} of ${totalQuestions}! Let's do this! 🎯`);
            })
            .catch(error => {
                console.error('Error loading question:', error);
                questionTextElement.textContent = 'Error loading question. Please refresh the page.';
                optionsContainer.innerHTML = '<div class="error-message">Failed to load question. <button onclick="location.reload()">Refresh</button></div>';
            });
    }
    
    function submitAnswer(answer) {
        if (!canAnswer) return;
        
        canAnswer = false;
        const timeTaken = Math.floor((Date.now() - questionStartTime) / 1000);
        
        // Clear timer
        if (timerInterval) {
            clearInterval(timerInterval);
            timerInterval = null;
        }
        
        // Disable all option buttons
        const allOptions = document.querySelectorAll('.option-enhanced');
        allOptions.forEach(btn => {
            btn.disabled = true;
            btn.style.opacity = '0.6';
            btn.style.cursor = 'not-allowed';
        });
        
        // Show loading in feedback
        feedbackDiv.innerHTML = '<div class="loading">🤔 Checking your answer...</div>';
        
        // Send answer to server
        fetch('/submit_answer', {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json',
            },
            body: JSON.stringify({
                answer: answer,
                time_taken: timeTaken
            })
        })
        .then(response => response.json())
        .then(data => {
            // Update score
            currentScore = data.score;
            if (scoreElement) {
                scoreElement.textContent = currentScore;
            }
            
            // Show feedback
            if (data.correct) {
                feedbackDiv.innerHTML = `
                    <div class="correct-answer">
                        <div style="font-size: 1.2em; margin-bottom: 8px;">✅ <strong>Correct!</strong> +${data.points_earned} points</div>
                        <div class="explanation">${escapeHtml(data.explanation)}</div>
                        ${data.points_earned >= 15 ? '<div class="bonus-badge">⚡ Speed Bonus!</div>' : ''}
                    </div>
                `;
                updateCharacterSpeech(`Correct! Great job! +${data.points_earned} points 🎉`);
                createConfetti();
            } else {
                feedbackDiv.innerHTML = `
                    <div class="wrong-answer">
                        <div style="font-size: 1.2em; margin-bottom: 8px;">❌ <strong>Wrong!</strong></div>
                        <div><strong>Correct answer:</strong> ${escapeHtml(data.correct_answer)}</div>
                        <div class="explanation">${escapeHtml(data.explanation)}</div>
                        <div class="encouragement">💪 Don't worry! You'll get it next time!</div>
                    </div>
                `;
                updateCharacterSpeech(`The correct answer was ${data.correct_answer}. You'll get it next time! 💪`);
            }
            
            // Check if quiz ended
            if (data.quiz_ended) {
                setTimeout(() => endQuiz(), 2500);
            } else {
                // Load next question after delay
                setTimeout(() => {
                    feedbackDiv.innerHTML = '';
                    loadQuestion();
                }, 2500);
            }
        })
        .catch(error => {
            console.error('Error submitting answer:', error);
            feedbackDiv.innerHTML = '<div class="error-message">❌ Network error. Please try again.</div>';
            canAnswer = true;
            // Re-enable options
            document.querySelectorAll('.option-enhanced').forEach(btn => {
                btn.disabled = false;
                btn.style.opacity = '1';
            });
        });
    }
    
    function resetTimer() {
        timeLeft = 20;
        timerElement.textContent = timeLeft;
        timerElement.style.color = '#2ecc71';
        
        // Reset progress circle
        const progressCircle = document.getElementById('timer-progress');
        if (progressCircle) {
            const circumference = 2 * Math.PI * 25;
            progressCircle.style.strokeDasharray = circumference;
            progressCircle.style.strokeDashoffset = '0';
        }
        
        // Clear existing timer
        if (timerInterval) {
            clearInterval(timerInterval);
        }
        
        // Start new timer
        timerInterval = setInterval(() => {
            if (timeLeft > 0 && canAnswer) {
                timeLeft--;
                timerElement.textContent = timeLeft;
                
                // Update progress circle
                if (progressCircle) {
                    const circumference = 2 * Math.PI * 25;
                    const offset = circumference * (1 - timeLeft / 20);
                    progressCircle.style.strokeDashoffset = offset;
                }
                
                // Change color based on time
                if (timeLeft <= 5) {
                    timerElement.style.color = '#e74c3c';
                    timerElement.style.transform = 'scale(1.1)';
                    updateCharacterSpeech(`Hurry! Only ${timeLeft} seconds left! ⏰`);
                } else if (timeLeft <= 10) {
                    timerElement.style.color = '#f39c12';
                    timerElement.style.transform = 'scale(1.05)';
                } else {
                    timerElement.style.color = '#2ecc71';
                    timerElement.style.transform = 'scale(1)';
                }
            }
            
            if (timeLeft === 0 && canAnswer) {
                clearInterval(timerInterval);
                timerInterval = null;
                feedbackDiv.innerHTML = '<div class="timeout">⏰ Time\'s up! Moving to next question...</div>';
                updateCharacterSpeech("Time's up! Be quicker next time! ⏰");
                submitAnswer(''); // Auto-submit empty (will be marked wrong)
            }
        }, 1000);
    }
    
    function endQuiz() {
        feedbackDiv.innerHTML = '<div class="quiz-ending">🎉 Quiz completed! Calculating your results... 🎉</div>';
        updateCharacterSpeech(`Quiz complete! Your final score: ${currentScore} points! 🏆`);
        
        fetch('/end_quiz', { method: 'POST' })
            .then(() => {
                setTimeout(() => {
                    window.location.href = '/result';
                }, 2000);
            })
            .catch(error => {
                console.error('Error ending quiz:', error);
                setTimeout(() => {
                    window.location.href = '/result';
                }, 2000);
            });
    }
    
    function createConfetti() {
        for (let i = 0; i < 50; i++) {
            const confetti = document.createElement('div');
            confetti.className = 'confetti';
            confetti.style.left = Math.random() * 100 + '%';
            confetti.style.backgroundColor = `hsl(${Math.random() * 360}, 100%, 50%)`;
            confetti.style.width = Math.random() * 10 + 5 + 'px';
            confetti.style.height = Math.random() * 10 + 5 + 'px';
            confetti.style.animationDelay = Math.random() * 2 + 's';
            confetti.style.position = 'fixed';
            confetti.style.top = '-10px';
            confetti.style.pointerEvents = 'none';
            confetti.style.zIndex = '9999';
            document.body.appendChild(confetti);
            setTimeout(() => confetti.remove(), 3000);
        }
    }
    
    function updateCharacterSpeech(message) {
        const speechBubble = document.querySelector('.speech-bubble');
        if (speechBubble) {
            speechBubble.textContent = message;
            speechBubble.style.animation = 'none';
            setTimeout(() => {
                speechBubble.style.animation = 'fadeInOut 3s infinite';
            }, 10);
        }
    }
    
    function escapeHtml(text) {
        if (!text) return '';
        const div = document.createElement('div');
        div.textContent = text;
        return div.innerHTML;
    }
    
    // Hint button functionality
    if (hintBtn) {
        hintBtn.addEventListener('click', () => {
            if (canAnswer && currentExplanation) {
                feedbackDiv.innerHTML = `<div class="hint-message">💡 Hint: ${escapeHtml(currentExplanation.substring(0, 150))}</div>`;
                hintBtn.disabled = true;
                hintBtn.style.opacity = '0.5';
                updateCharacterSpeech("Using hints is smart! Keep learning! 💡");
                setTimeout(() => {
                    if (feedbackDiv.innerHTML.includes('Hint')) {
                        feedbackDiv.innerHTML = '';
                    }
                }, 5000);
            } else if (!canAnswer) {
                feedbackDiv.innerHTML = '<div class="warning">⏳ Please wait for the next question!</div>';
                setTimeout(() => {
                    if (feedbackDiv.innerHTML.includes('Please wait')) {
                        feedbackDiv.innerHTML = '';
                    }
                }, 2000);
            }
        });
    }
    
    // Keyboard shortcuts
    document.addEventListener('keydown', function(event) {
        if (!canAnswer) return;
        
        const key = event.key.toLowerCase();
        let option = null;
        
        if (key === '1' || key === 'a') option = 'A';
        else if (key === '2' || key === 'b') option = 'B';
        else if (key === '3' || key === 'c') option = 'C';
        else if (key === '4' || key === 'd') option = 'D';
        
        if (option) {
            event.preventDefault();
            // Highlight the option
            const buttons = document.querySelectorAll('.option-enhanced');
            buttons.forEach(btn => {
                if (btn.getAttribute('data-opt') === option) {
                    btn.style.transform = 'scale(1.05)';
                    btn.style.background = '#667eea';
                    btn.style.color = 'white';
                    setTimeout(() => {
                        btn.style.transform = '';
                        btn.style.background = '';
                        btn.style.color = '';
                    }, 200);
                }
            });
            submitAnswer(option);
        }
        
        if (key === 'h') {
            event.preventDefault();
            if (hintBtn && !hintBtn.disabled) {
                hintBtn.click();
            }
        }
    });
    
    // Initialize quiz
    loadQuestion();
</script>

<style>
    /* Additional styles for quiz page */
    .loading-spinner {
        text-align: center;
        padding: 40px;
        font-size: 1.5rem;
        animation: spin 1s linear infinite;
    }
    
    @keyframes spin {
        from { transform: rotate(0deg); }
        to { transform: rotate(360deg); }
    }
    
    .option-enhanced {
        padding: 15px 20px;
        background: #f8f9fa;
        border: 2px solid #e0e0e0;
        border-radius: 12px;
        cursor: pointer;
        transition: all 0.3s;
        text-align: left;
        font-size: 1rem;
        font-family: inherit;
        width: 100%;
    }
    
    .option-enhanced:hover:not(:disabled) {
        background: #667eea;
        color: white;
        transform: translateX(5px);
        border-color: #667eea;
    }
    
    .option-enhanced:disabled {
        cursor: not-allowed;
    }
    
    .opt-letter {
        font-weight: bold;
        margin-right: 10px;
        color: #667eea;
    }
    
    .option-enhanced:hover .opt-letter {
        color: white;
    }
    
    .correct-answer, .wrong-answer, .timeout, .hint-message {
        padding: 15px;
        border-radius: 10px;
        margin-top: 15px;
    }
    
    .correct-answer {
        background: #d4edda;
        color: #155724;
        border-left: 4px solid #28a745;
    }
    
    .wrong-answer {
        background: #f8d7da;
        color: #721c24;
        border-left: 4px solid #dc3545;
    }
    
    .timeout {
        background: #fff3cd;
        color: #856404;
        border-left: 4px solid #ffc107;
    }
    
    .hint-message {
        background: #e1f5fe;
        color: #0277bd;
        border-left: 4px solid #03a9f4;
    }
    
    .explanation {
        margin-top: 8px;
        font-size: 0.9em;
        opacity: 0.9;
    }
    
    .bonus-badge {
        margin-top: 10px;
        padding: 5px 10px;
        background: #ffc107;
        border-radius: 20px;
        display: inline-block;
        font-weight: bold;
        animation: pulse 1s infinite;
    }
    
    .encouragement {
        margin-top: 10px;
        font-style: italic;
    }
    
    .quiz-ending {
        text-align: center;
        padding: 20px;
        font-size: 1.2em;
        background: linear-gradient(135deg, #667eea, #764ba2);
        color: white;
        border-radius: 10px;
        animation: pulse 1s infinite;
        margin-top: 15px;
    }
    
    .error-message {
        text-align: center;
        padding: 20px;
        color: #dc3545;
    }
    
    .warning {
        background: #fff3cd;
        color: #856404;
        padding: 10px;
        border-radius: 5px;
        text-align: center;
        margin-top: 15px;
    }
    
    .loading {
        text-align: center;
        padding: 15px;
        color: #667eea;
    }
    
    @keyframes pulse {
        0%, 100% { opacity: 1; transform: scale(1); }
        50% { opacity: 0.8; transform: scale(1.02); }
    }
</style>
{% endblock %}
